services:
  - type: web
    name: cosmic-timeline-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NASA_API_KEY
        value: DEMO_KEY
      - key: FRONTEND_URL
        value: https://cosmic-timeline.vercel.app
